<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home — Compact Table</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        background: #181818;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        color: #bbb;
        padding: 16px;
      }

      .sections {
        max-width: 900px;
        margin: 0 auto;
      }

      .section {
        margin-bottom: 16px;
      }

      .section-title {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: #555;
        padding: 4px 0;
        border-bottom: 1px solid #282828;
        margin-bottom: 4px;
      }

      .links {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 2px;
      }

      .links a {
        display: flex;
        align-items: center;
        gap: 7px;
        padding: 7px 10px;
        color: #999;
        text-decoration: none;
        font-size: 12px;
        border-radius: 4px;
        transition: background 0.12s, color 0.12s;
      }

      .links a:hover {
        background: #242424;
        color: #ddd;
      }

      .links a img {
        width: 13px;
        height: 13px;
        flex-shrink: 0;
        opacity: 0.6;
      }

      .links a:hover img {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div class="sections">
      <div class="section">
        <div class="section-title">Search & Productivity</div>
        <div class="links">
          <a href="https://www.google.com"><img src="https://www.google.com/favicon.ico" alt="" />Google</a>
          <a href="https://calendar.google.com"
            ><img
              src="https://calendar.google.com/googlecalendar/images/favicons_2020q4/calendar_31.ico"
              alt=""
            />Calendar</a
          >
          <!-- add more -->
        </div>
      </div>

      <div class="section">
        <div class="section-title">Media & Other</div>
        <div class="links">
          <a href="https://www.youtube.com"><img src="https://www.youtube.com/favicon.ico" alt="" />YouTube</a>
          <a href="https://example.net"><img src="https://example.net/favicon.ico" alt="" />example.net</a>
          <!-- add more -->
        </div>
      </div>

      <div class="section">
        <div class="section-title">Dev & AI</div>
        <div class="links">
          <a href="https://chatgpt.com"><img src="https://chatgpt.com/favicon.ico" alt="" />ChatGPT</a>
          <a href="https://github.com"><img src="https://github.com/favicon.ico" alt="" />GitHub</a>
          <!-- add more -->
        </div>
      </div>

      <!-- add more sections -->
    </div>
  </body>
</html>
