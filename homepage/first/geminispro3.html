<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Homepage - Command Palette</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #0d1117;
        --panel: #161b22;
        --border: #30363d;
        --text: #c9d1d9;
        --hover-bg: #21262d;
        --accent: #58a6ff;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: "Roboto Mono", monospace;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 1rem;
        box-sizing: border-box;
      }
      .palette {
        width: 100%;
        max-width: 800px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 16px 32px rgba(0, 0, 0, 0.5);
      }
      .header {
        padding: 1rem;
        border-bottom: 1px solid var(--border);
        font-size: 0.9rem;
        color: #8b949e;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .header span.dot {
        display: inline-block;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: var(--border);
      }
      .header span.dot:nth-child(1) {
        background: #ff5f56;
      }
      .header span.dot:nth-child(2) {
        background: #ffbd2e;
      }
      .header span.dot:nth-child(3) {
        background: #27c93f;
      }
      .header .title {
        margin-left: 10px;
        opacity: 0.7;
      }
      .grid-view {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        padding: 1rem;
        gap: 0.5rem;
      }
      .link-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.75rem 1rem;
        color: var(--text);
        text-decoration: none;
        border-radius: 6px;
        transition: background 0.2s, color 0.2s;
        font-size: 0.95rem;
        border: 1px solid transparent;
      }
      .link-item:hover {
        background: var(--hover-bg);
        color: var(--accent);
        border-color: var(--border);
      }
      .shortcut {
        font-size: 0.8rem;
        color: #8b949e;
        background: var(--bg);
        padding: 2px 6px;
        border-radius: 4px;
        border: 1px solid var(--border);
      }
    </style>
  </head>
  <body>
    <div class="palette">
      <div class="header">
        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
        <span class="title">~/start-page</span>
      </div>
      <div class="grid-view">
        <a href="https://google.com" class="link-item"> <span>Google</span><span class="shortcut">⌘ G</span> </a>
        <a href="https://calendar.google.com" class="link-item">
          <span>Calendar</span><span class="shortcut">⌘ C</span>
        </a>
        <a href="https://youtube.com" class="link-item"> <span>YouTube</span><span class="shortcut">⌘ Y</span> </a>
        <a href="https://chatgpt.com" class="link-item"> <span>ChatGPT</span><span class="shortcut">⌘ P</span> </a>
        <a href="https://github.com" class="link-item"> <span>GitHub</span><span class="shortcut">⌘ H</span> </a>
        <a href="http://example.net" class="link-item"> <span>Example</span><span class="shortcut">⌘ E</span> </a>
      </div>
    </div>
  </body>
</html>
