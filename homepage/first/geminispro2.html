<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Homepage - Neobrutalism</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #ebd4cb;
        --text: #1a1a1a;
        --card-bg: #ffffff;
        --shadow: 4px 4px 0px #1a1a1a;
        --border: 2px solid #1a1a1a;
      }
      body {
        margin: 0;
        padding: 2rem;
        min-height: 100vh;
        background: var(--bg);
        font-family: "Inter", sans-serif;
        color: var(--text);
        box-sizing: border-box;
      }
      .container {
        max-width: 1000px;
        margin: 0 auto;
      }
      h1 {
        font-size: 2.5rem;
        text-transform: uppercase;
        letter-spacing: -1px;
        margin-bottom: 2rem;
        text-align: center;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 1.5rem;
      }
      .card {
        background: var(--card-bg);
        border: var(--border);
        border-radius: 8px;
        padding: 1.5rem 1rem;
        text-decoration: none;
        color: var(--text);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        box-shadow: var(--shadow);
        transition: transform 0.1s, box-shadow 0.1s;
        font-weight: 700;
      }
      .card:hover {
        transform: translate(-2px, -2px);
        box-shadow: 6px 6px 0px #1a1a1a;
      }
      .card:active {
        transform: translate(4px, 4px);
        box-shadow: 0px 0px 0px #1a1a1a;
      }
      .card[data-color="1"] {
        background: #ff90e8;
      }
      .card[data-color="2"] {
        background: #ffc900;
      }
      .card[data-color="3"] {
        background: #23a094;
        color: #fff;
      }
      .card[data-color="4"] {
        background: #90a8ed;
      }
      .card[data-color="5"] {
        background: #ff6b6b;
        color: #fff;
      }
      .card[data-color="6"] {
        background: #fff;
      }
      .icon {
        font-size: 1.5rem;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Launchpad</h1>
      <div class="grid">
        <a href="https://google.com" class="card" data-color="1"><span class="icon">🔍</span>Google</a>
        <a href="https://calendar.google.com" class="card" data-color="2"><span class="icon">📅</span>Calendar</a>
        <a href="https://youtube.com" class="card" data-color="5"><span class="icon">▶️</span>YouTube</a>
        <a href="https://chatgpt.com" class="card" data-color="3"><span class="icon">🤖</span>ChatGPT</a>
        <a href="https://github.com" class="card" data-color="6"><span class="icon">🐙</span>GitHub</a>
        <a href="http://example.net" class="card" data-color="4"><span class="icon">🌐</span>Example.net</a>
      </div>
    </div>
  </body>
</html>
