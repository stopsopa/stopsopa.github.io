<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home — Sidebar</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        background: #121212;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        color: #ccc;
      }

      .layout {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 0;
        min-height: 100vh;
      }

      .col {
        border-right: 1px solid #222;
        padding: 20px 0;
      }

      .col:last-child {
        border-right: none;
      }

      .col h3 {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        color: #555;
        padding: 0 16px 8px;
      }

      .col a {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 16px;
        color: #999;
        text-decoration: none;
        font-size: 13px;
        transition: background 0.12s, color 0.12s;
      }

      .col a:hover {
        background: #1e1e1e;
        color: #e0e0e0;
      }

      .col a img {
        width: 14px;
        height: 14px;
        flex-shrink: 0;
        opacity: 0.6;
      }

      .col a:hover img {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <div class="col">
        <h3>Google</h3>
        <a href="https://www.google.com"><img src="https://www.google.com/favicon.ico" alt="" />Search</a>
        <a href="https://calendar.google.com"
          ><img
            src="https://calendar.google.com/googlecalendar/images/favicons_2020q4/calendar_31.ico"
            alt=""
          />Calendar</a
        >
        <!-- add more -->
      </div>

      <div class="col">
        <h3>Media</h3>
        <a href="https://www.youtube.com"><img src="https://www.youtube.com/favicon.ico" alt="" />YouTube</a>
        <a href="https://example.net"><img src="https://example.net/favicon.ico" alt="" />example.net</a>
        <!-- add more -->
      </div>

      <div class="col">
        <h3>Dev & AI</h3>
        <a href="https://chatgpt.com"><img src="https://chatgpt.com/favicon.ico" alt="" />ChatGPT</a>
        <a href="https://github.com"><img src="https://github.com/favicon.ico" alt="" />GitHub</a>
        <!-- add more -->
      </div>

      <!-- add more columns — they auto-flow -->
    </div>
  </body>
</html>
