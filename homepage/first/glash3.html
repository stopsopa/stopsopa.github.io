<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard - Minimalist</title>
    <style>
      :root {
        --bg: #ffffff;
        --text: #171717;
        --muted: #737373;
        --hover: #f5f5f5;
        --border: #e5e5e5;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0a0a0a;
          --text: #ededed;
          --muted: #a1a1aa;
          --hover: #1a1a1a;
          --border: #262626;
        }
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background-color: var(--bg);
        color: var(--text);
        font-family: "Inter", system-ui, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
      }

      .wrapper {
        width: 100%;
        max-width: 500px;
      }

      .header {
        margin-bottom: 2rem;
        padding-bottom: 1rem;
        border-bottom: 1px solid var(--border);
      }

      h1 {
        font-size: 1.2rem;
        font-weight: 600;
        letter-spacing: -0.02em;
      }

      .links-list {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .link-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 16px;
        text-decoration: none;
        color: inherit;
        border-radius: 8px;
        transition: background 0.2s ease;
      }

      .link-item:hover {
        background-color: var(--hover);
      }

      .link-content {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .link-icon {
        width: 32px;
        height: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--hover);
        border-radius: 6px;
        font-size: 1.1rem;
      }

      .link-name {
        font-size: 0.95rem;
        font-weight: 500;
      }

      .link-domain {
        font-size: 0.8rem;
        color: var(--muted);
      }

      .chevron {
        color: var(--muted);
        font-size: 0.8rem;
        opacity: 0;
        transition: opacity 0.2s ease, transform 0.2s ease;
      }

      .link-item:hover .chevron {
        opacity: 1;
        transform: translateX(4px);
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <div class="header">
        <h1>Workspace</h1>
      </div>
      <div class="links-list">
        <a href="https://google.com" class="link-item" id="link-google">
          <div class="link-content">
            <div class="link-icon">G</div>
            <span class="link-name">Google Search</span>
          </div>
          <span class="chevron">→</span>
        </a>
        <a href="https://calendar.google.com" class="link-item" id="link-calendar">
          <div class="link-content">
            <div class="link-icon">📅</div>
            <span class="link-name">Google Calendar</span>
          </div>
          <span class="chevron">→</span>
        </a>
        <a href="https://youtube.com" class="link-item" id="link-youtube">
          <div class="link-content">
            <div class="link-icon">▶️</div>
            <span class="link-name">YouTube</span>
          </div>
          <span class="chevron">→</span>
        </a>
        <a href="https://chatgpt.com" class="link-item" id="link-chatgpt">
          <div class="link-content">
            <div class="link-icon">🤖</div>
            <span class="link-name">ChatGPT</span>
          </div>
          <span class="chevron">→</span>
        </a>
        <a href="https://github.com" class="link-item" id="link-github">
          <div class="link-content">
            <div class="link-icon">🐙</div>
            <span class="link-name">GitHub</span>
          </div>
          <span class="chevron">→</span>
        </a>
        <a href="https://example.net" class="link-item" id="link-example">
          <div class="link-content">
            <div class="link-icon">🔗</div>
            <span class="link-name">Example.net</span>
          </div>
          <span class="chevron">→</span>
        </a>
      </div>
    </div>
  </body>
</html>
