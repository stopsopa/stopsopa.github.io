<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Homepage - Glassmorphism</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg-color: #0f172a;
        --card-bg: rgba(255, 255, 255, 0.05);
        --card-border: rgba(255, 255, 255, 0.1);
        --text: #f8fafc;
        --accent: #38bdf8;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg-color);
        background-image: radial-gradient(at 0% 0%, hsla(253, 16%, 7%, 1) 0, transparent 50%),
          radial-gradient(at 50% 0%, hsla(225, 39%, 30%, 1) 0, transparent 50%),
          radial-gradient(at 100% 0%, hsla(339, 49%, 30%, 1) 0, transparent 50%);
        font-family: "Outfit", sans-serif;
        color: var(--text);
        display: flex;
        flex-direction: column;
        padding: 2rem;
        box-sizing: border-box;
      }
      header {
        margin-bottom: 2rem;
        text-align: center;
      }
      h1 {
        font-weight: 600;
        margin: 0;
        font-size: 2rem;
        letter-spacing: -0.5px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 1rem;
        width: 100%;
        max-width: 1200px;
        margin: 0 auto;
      }
      .card {
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border-radius: 12px;
        padding: 1.5rem 1rem;
        text-decoration: none;
        color: var(--text);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        position: relative;
        overflow: hidden;
      }
      .card::before {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 50%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
        transition: all 0.5s;
      }
      .card:hover {
        transform: translateY(-4px) scale(1.02);
        border-color: var(--accent);
        box-shadow: 0 10px 30px -10px rgba(56, 189, 248, 0.3);
      }
      .card:hover::before {
        left: 100%;
      }
      .icon {
        font-size: 1.5rem;
        margin-bottom: 0.5rem;
      }
      .title {
        font-size: 0.95rem;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Start Page</h1>
    </header>
    <main class="grid">
      <a href="https://google.com" class="card">
        <div class="icon">🔍</div>
        <div class="title">Google</div>
      </a>
      <a href="https://calendar.google.com" class="card">
        <div class="icon">📅</div>
        <div class="title">Google Calendar</div>
      </a>
      <a href="https://youtube.com" class="card">
        <div class="icon">▶️</div>
        <div class="title">YouTube</div>
      </a>
      <a href="https://chatgpt.com" class="card">
        <div class="icon">🤖</div>
        <div class="title">ChatGPT</div>
      </a>
      <a href="https://github.com" class="card">
        <div class="icon">🐙</div>
        <div class="title">GitHub</div>
      </a>
      <a href="http://example.net" class="card">
        <div class="icon">🌐</div>
        <div class="title">Example.net</div>
      </a>
    </main>
  </body>
</html>
