<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Link Templates Gallery</title>
    <style>
      body {
        font-family: "Inter", sans-serif;
        background: #0f172a;
        color: #f1f5f9;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
      }
      h1 {
        margin-bottom: 2rem;
        font-weight: 300;
        letter-spacing: 2px;
      }
      .gallery {
        display: flex;
        gap: 1.5rem;
        flex-wrap: wrap;
        justify-content: center;
      }
      .v-link {
        padding: 1rem 2rem;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        color: #94a3b8;
        text-decoration: none;
        transition: all 0.3s ease;
      }
      .v-link:hover {
        background: rgba(255, 255, 255, 0.1);
        border-color: #3b82f6;
        color: #fff;
        transform: translateY(-5px);
      }
    </style>
  </head>
  <body>
    <h1>CHOOSE TEMPLATE</h1>
    <div class="gallery">
      <a href="glash1.html" class="v-link">Version 1: Bento</a>
      <a href="glash2.html" class="v-link">Version 2: Glass</a>
      <a href="glash3.html" class="v-link">Version 3: Minimal</a>
      <a href="glash4.html" class="v-link">Version 4: Cyber</a>
      <a href="glash5.html" class="v-link">Version 5: Mosaic</a>
      <a href="glash6.html" class="v-link">Version 6: Glass Sidebar</a>
    </div>
  </body>
</html>
