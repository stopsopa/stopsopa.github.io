<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home — Grouped</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        background: #0f0f0f;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        color: #ccc;
        padding: 40px 24px;
      }

      .container {
        max-width: 800px;
        margin: 0 auto;
        display: flex;
        flex-wrap: wrap;
        gap: 24px;
      }

      .group {
        flex: 1 1 200px;
        min-width: 180px;
      }

      .group h2 {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        color: #666;
        margin-bottom: 8px;
        padding-left: 4px;
      }

      .group ul {
        list-style: none;
      }

      .group li a {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 7px 10px;
        border-radius: 6px;
        color: #bbb;
        text-decoration: none;
        font-size: 13px;
        transition: background 0.15s, color 0.15s;
      }

      .group li a:hover {
        background: rgba(255, 255, 255, 0.07);
        color: #fff;
      }

      .group li a img {
        width: 14px;
        height: 14px;
        flex-shrink: 0;
        opacity: 0.7;
      }

      .group li a:hover img {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="group">
        <h2>Search & Tools</h2>
        <ul>
          <li>
            <a href="https://www.google.com"><img src="https://www.google.com/favicon.ico" alt="" />Google</a>
          </li>
          <li>
            <a href="https://calendar.google.com"
              ><img
                src="https://calendar.google.com/googlecalendar/images/favicons_2020q4/calendar_31.ico"
                alt=""
              />Google Calendar</a
            >
          </li>
          <!-- add more -->
        </ul>
      </div>

      <div class="group">
        <h2>Media</h2>
        <ul>
          <li>
            <a href="https://www.youtube.com"><img src="https://www.youtube.com/favicon.ico" alt="" />YouTube</a>
          </li>
          <li>
            <a href="https://example.net"><img src="https://example.net/favicon.ico" alt="" />example.net</a>
          </li>
          <!-- add more -->
        </ul>
      </div>

      <div class="group">
        <h2>Dev & AI</h2>
        <ul>
          <li>
            <a href="https://chatgpt.com"><img src="https://chatgpt.com/favicon.ico" alt="" />ChatGPT</a>
          </li>
          <li>
            <a href="https://github.com"><img src="https://github.com/favicon.ico" alt="" />GitHub</a>
          </li>
          <!-- add more -->
        </ul>
      </div>

      <!-- add more groups -->
    </div>
  </body>
</html>
