<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home — Dock</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        min-height: 100vh;
        background: radial-gradient(ellipse at 30% 70%, #0d1a2e 0%, #070b10 100%);
        font-family: "Inter", system-ui, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .center-text {
        color: rgba(255, 255, 255, 0.04);
        font-size: clamp(4rem, 15vw, 10rem);
        font-weight: 700;
        letter-spacing: -0.04em;
        user-select: none;
        pointer-events: none;
      }
      .dock-wrap {
        position: fixed;
        bottom: 1.5rem;
        left: 50%;
        transform: translateX(-50%);
      }
      .dock {
        display: flex;
        align-items: flex-end;
        gap: 0.5rem;
        padding: 0.6rem 1rem;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.03) inset;
      }
      .dock-item {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .dock-item a {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 48px;
        height: 48px;
        background: rgba(255, 255, 255, 0.07);
        border-radius: 12px;
        text-decoration: none;
        transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      .dock-item a img {
        width: 26px;
        height: 26px;
        border-radius: 4px;
      }
      .dock-item a:hover {
        transform: translateY(-12px) scale(1.35);
      }
      .dock-item .tip {
        position: absolute;
        bottom: calc(100% + 14px);
        left: 50%;
        transform: translateX(-50%);
        background: rgba(20, 20, 30, 0.9);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: #ddd;
        font-size: 0.72rem;
        padding: 3px 10px;
        border-radius: 6px;
        white-space: nowrap;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.15s;
      }
      .dock-item:hover .tip {
        opacity: 1;
      }
      .dock-sep {
        width: 1px;
        height: 32px;
        background: rgba(255, 255, 255, 0.1);
        align-self: center;
        margin: 0 0.15rem;
      }
    </style>
  </head>
  <body>
    <div class="center-text">HOME</div>
    <div class="dock-wrap">
      <div class="dock" role="navigation" aria-label="Quick links">
        <div class="dock-item">
          <a href="https://www.google.com" id="link-google"
            ><img src="https://www.google.com/favicon.ico" alt="Google"
          /></a>
          <span class="tip">Google</span>
        </div>
        <div class="dock-item">
          <a href="https://calendar.google.com" id="link-calendar"
            ><img
              src="https://calendar.google.com/googlecalendar/images/favicons_2020q4/calendar_31.ico"
              alt="Calendar"
          /></a>
          <span class="tip">Calendar</span>
        </div>
        <div class="dock-item">
          <a href="https://www.youtube.com" id="link-youtube"
            ><img src="https://www.youtube.com/favicon.ico" alt="YouTube"
          /></a>
          <span class="tip">YouTube</span>
        </div>
        <div class="dock-sep"></div>
        <div class="dock-item">
          <a href="https://chatgpt.com" id="link-chatgpt"
            ><img src="https://chatgpt.com/favicon.ico" alt="ChatGPT"
          /></a>
          <span class="tip">ChatGPT</span>
        </div>
        <div class="dock-item">
          <a href="https://github.com" id="link-github"><img src="https://github.com/favicon.ico" alt="GitHub" /></a>
          <span class="tip">GitHub</span>
        </div>
        <div class="dock-sep"></div>
        <div class="dock-item">
          <a href="https://example.net" id="link-example"
            ><img src="https://example.net/favicon.ico" alt="example.net"
          /></a>
          <span class="tip">example.net</span>
        </div>
        <!-- add more dock-item blocks -->
      </div>
    </div>
  </body>
</html>
