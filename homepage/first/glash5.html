<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard - Mosaic</title>
    <style>
      :root {
        --bg: #f8fafc;
        --card-white: #ffffff;
        --text-main: #1e293b;
        --text-sub: #64748b;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0f172a;
          --card-white: #1e293b;
          --text-main: #f1f5f9;
          --text-sub: #94a3b8;
        }
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background-color: var(--bg);
        color: var(--text-main);
        font-family: "Outfit", sans-serif;
        padding: 40px;
        display: flex;
        justify-content: center;
      }

      .mosaic {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        grid-auto-rows: 150px;
        gap: 20px;
        width: 100%;
        max-width: 1000px;
      }

      .card {
        background: var(--card-white);
        border-radius: 24px;
        padding: 24px;
        text-decoration: none;
        color: inherit;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        border: 1px solid rgba(0, 0, 0, 0.05);
      }

      .card:hover {
        transform: scale(1.02);
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
      }

      /* Mosaic Layout variations */
      .card.w-2 {
        grid-column: span 2;
      }
      .card.h-2 {
        grid-row: span 2;
      }

      .icon-box {
        width: 48px;
        height: 48px;
        border-radius: 12px;
        background: rgba(59, 130, 246, 0.1);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
        margin-bottom: 1rem;
      }

      .card-title {
        font-size: 1.1rem;
        font-weight: 600;
      }

      .card-desc {
        font-size: 0.85rem;
        color: var(--text-sub);
        margin-top: 4px;
      }

      /* Specific colors */
      #link-google .icon-box {
        background: rgba(66, 133, 244, 0.1);
        color: #4285f4;
      }
      #link-youtube .icon-box {
        background: rgba(255, 0, 0, 0.1);
        color: #ff0000;
      }
      #link-github .icon-box {
        background: rgba(36, 41, 46, 0.1);
        color: #24292e;
      }
      #link-chatgpt .icon-box {
        background: rgba(16, 163, 127, 0.1);
        color: #10a37f;
      }

      @media (max-width: 800px) {
        .mosaic {
          grid-template-columns: repeat(2, 1fr);
        }
        .card.w-2 {
          grid-column: span 1;
        }
      }
    </style>
  </head>
  <body>
    <div class="mosaic">
      <a href="https://google.com" class="card w-2" id="link-google">
        <div class="icon-box">G</div>
        <div>
          <div class="card-title">Google</div>
          <div class="card-desc">Search the world</div>
        </div>
      </a>
      <a href="https://calendar.google.com" class="card h-2" id="link-calendar">
        <div class="icon-box">📅</div>
        <div>
          <div class="card-title">Calendar</div>
          <div class="card-desc">Your schedule</div>
        </div>
      </a>
      <a href="https://youtube.com" class="card" id="link-youtube">
        <div class="icon-box">▶️</div>
        <div>
          <div class="card-title">YouTube</div>
        </div>
      </a>
      <a href="https://chatgpt.com" class="card h-2" id="link-chatgpt">
        <div class="icon-box">🤖</div>
        <div>
          <div class="card-title">ChatGPT</div>
          <div class="card-desc">AI Assistant</div>
        </div>
      </a>
      <a href="https://github.com" class="card w-2" id="link-github">
        <div class="icon-box">🐙</div>
        <div>
          <div class="card-title">GitHub</div>
          <div class="card-desc">Code & collaboration</div>
        </div>
      </a>
      <a href="https://example.net" class="card" id="link-example">
        <div class="icon-box">🌐</div>
        <div>
          <div class="card-title">Example</div>
        </div>
      </a>
    </div>
  </body>
</html>
