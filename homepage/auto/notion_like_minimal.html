<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notion-like Minimal Homepage</title>
    <meta name="description" content="A clean, Notion-inspired minimalist link dashboard.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #37352f;
            --text-secondary: rgba(55, 53, 47, 0.65);
            --hover-bg: #f1f1ef;
            --border-color: #ededeb;
            --icon-size: 18px;
            --sidebar-width: 320px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: var(--sidebar-width);
            min-height: 100vh;
            padding: 40px 20px;
            border-right: 1px solid var(--border-color);
        }

        header {
            margin-bottom: 32px;
            padding-left: 12px;
        }

        h1 {
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: -0.01em;
        }

        .section {
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 8px;
            padding-left: 12px;
            letter-spacing: 0.05em;
        }

        .links-grid {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .link-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 12px;
            text-decoration: none;
            color: inherit;
            border-radius: 4px;
            transition: background 0.15s ease;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .link-item:hover {
            background-color: var(--hover-bg);
        }

        .link-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: var(--icon-size);
            height: var(--icon-size);
            color: var(--text-secondary);
        }

        .link-item:hover .link-icon {
            color: var(--text-color);
        }

        /* Custom scrollbar for a cleaner look */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #d3d1cb;
            border-radius: 10px;
            border: 2px solid var(--bg-color);
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #aeaca6;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Personal Dashboard</h1>
        </header>

        <div class="section">
            <h2 class="section-title">Search & Tools</h2>
            <div class="links-grid">
                <a href="https://google.com" class="link-item" target="_blank">
                    <span class="link-icon"><i data-lucide="search"></i></span>
                    Google
                </a>
                <a href="https://duckduckgo.com" class="link-item" target="_blank">
                    <span class="link-icon"><i data-lucide="shield"></i></span>
                    DuckDuckGo
                </a>
                <a href="https://translate.google.com" class="link-item" target="_blank">
                    <span class="link-icon"><i data-lucide="languages"></i></span>
                    Translate
                </a>
            </div>
        </div>

        <div class="section">
            <h2 class="section-title">Artificial Intelligence</h2>
            <div class="links-grid">
                <a href="https://chat.openai.com" class="link-item" target="_blank">
                    <span class="link-icon"><i data-lucide="bot"></i></span>
                    ChatGPT
                </a>
                <a href="https://claude.ai" class="link-item" target="_blank">
                    <span class="link-icon"><i data-lucide="sparkles"></i></span>
                    Claude
                </a>
                <a href="https://gemini.google.com" class="link-item" target="_blank">
                    <span class="link-icon"><i data-lucide="brain-circuit"></i></span>
                    Gemini
                </a>
                <a href="https://perplexity.ai" class="link-item" target="_blank">
                    <span class="link-icon"><i data-lucide="map"></i></span>
                    Perplexity
                </a>
            </div>
        </div>

        <div class="section">
            <h2 class="section-title">Development</h2>
            <div class="links-grid">
                <a href="https://github.com" class="link-item" target="_blank">
                    <span class="link-icon"><i data-lucide="github"></i></span>
                    GitHub
                </a>
                <a href="https://stackoverflow.com" class="link-item" target="_blank">
                    <span class="link-icon"><i data-lucide="layers"></i></span>
                    Stack Overflow
                </a>
                <a href="https://vercel.com" class="link-item" target="_blank">
                    <span class="link-icon"><i data-lucide="triangle"></i></span>
                    Vercel
                </a>
            </div>
        </div>

        <div class="section">
            <h2 class="section-title">Productivity</h2>
            <div class="links-grid">
                <a href="https://notion.so" class="link-item" target="_blank">
                    <span class="link-icon"><i data-lucide="file-text"></i></span>
                    Notion
                </a>
                <a href="https://calendar.google.com" class="link-item" target="_blank">
                    <span class="link-icon"><i data-lucide="calendar"></i></span>
                    Calendar
                </a>
                <a href="https://mail.google.com" class="link-item" target="_blank">
                    <span class="link-icon"><i data-lucide="mail"></i></span>
                    Gmail
                </a>
            </div>
        </div>
    </div>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();
    </script>
</body>
</html>
