<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Utility Shelf | Control Panel</title>
    <meta
      name="description"
      content="A minimal, functional layout for frequently used links, designed as a personal utility shelf."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-color: #0f1115;
        --sidebar-bg: #161a20;
        --border-color: #2a2f3a;
        --text-primary: #e1e4e8;
        --text-secondary: #8b949e;
        --accent-color: #58a6ff;
        --hover-bg: #1f242c;
        --shelf-width: 320px;
        --font-main: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
        --font-mono: "JetBrains Mono", monospace;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background-color: var(--bg-color);
        color: var(--text-primary);
        font-family: var(--font-main);
        line-height: 1.5;
        height: 100vh;
        overflow: hidden;
        display: flex;
      }

      #shelf {
        width: var(--shelf-width);
        height: 100%;
        background-color: var(--sidebar-bg);
        border-right: 1px solid var(--border-color);
        display: flex;
        flex-direction: column;
        padding: 24px 16px;
        box-shadow: 10px 0 30px rgba(0, 0, 0, 0.5);
        overflow-y: auto;
      }

      #shelf::-webkit-scrollbar {
        width: 4px;
      }
      #shelf::-webkit-scrollbar-thumb {
        background: var(--border-color);
        border-radius: 10px;
      }

      header {
        margin-bottom: 32px;
        padding-bottom: 16px;
        border-bottom: 1px solid var(--border-color);
      }

      h1 {
        font-size: 14px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--text-secondary);
        font-family: var(--font-mono);
      }

      .group {
        margin-bottom: 28px;
      }

      .group-label {
        font-size: 11px;
        font-weight: 700;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 8px;
        opacity: 0.7;
      }

      .group-label::after {
        content: "";
        flex: 1;
        height: 1px;
        background-color: var(--border-color);
      }

      .links {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .link-item {
        display: flex;
        align-items: center;
        padding: 8px 12px;
        border-radius: 6px;
        text-decoration: none;
        color: var(--text-primary);
        font-size: 13px;
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        border: 1px solid transparent;
      }

      .link-item:hover {
        background-color: var(--hover-bg);
        border-color: var(--border-color);
        transform: translateX(4px);
      }

      .icon {
        width: 18px;
        height: 18px;
        margin-right: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--accent-color);
        flex-shrink: 0;
      }

      .icon svg {
        width: 100%;
        height: 100%;
      }

      .shortcut {
        margin-left: auto;
        font-size: 10px;
        font-family: var(--font-mono);
        color: var(--text-secondary);
        opacity: 0.5;
        background: rgba(255, 255, 255, 0.05);
        padding: 2px 4px;
        border-radius: 3px;
      }

      /* Micro-animations */
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .group {
        animation: fadeIn 0.4s ease forwards;
      }

      .group:nth-child(2) {
        animation-delay: 0.1s;
      }
      .group:nth-child(3) {
        animation-delay: 0.2s;
      }
      .group:nth-child(4) {
        animation-delay: 0.3s;
      }
      .group:nth-child(5) {
        animation-delay: 0.4s;
      }

      /* Status Bar at bottom */
      .shelf-footer {
        margin-top: auto;
        padding-top: 16px;
        border-top: 1px solid var(--border-color);
        font-size: 10px;
        color: var(--text-secondary);
        font-family: var(--font-mono);
        display: flex;
        justify-content: space-between;
      }

      .status-dot {
        width: 6px;
        height: 6px;
        background-color: #4ade80;
        border-radius: 50%;
        display: inline-block;
        margin-right: 4px;
        box-shadow: 0 0 8px #4ade8088;
      }
    </style>
  </head>
  <body>
    <aside id="shelf">
      <header>
        <h1>Utility Shelf v1.0</h1>
      </header>

      <section class="group" id="group-search">
        <div class="group-label">Search</div>
        <div class="links">
          <a href="https://google.com" class="link-item" id="link-google">
            <div class="icon">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
              </svg>
            </div>
            <span>Google</span>
            <span class="shortcut">/</span>
          </a>
          <a href="https://duckduckgo.com" class="link-item" id="link-ddg">
            <div class="icon">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
              </svg>
            </div>
            <span>DuckDuckGo</span>
          </a>
        </div>
      </section>

      <section class="group" id="group-ai">
        <div class="group-label">Artificial Intelligence</div>
        <div class="links">
          <a href="https://chatgpt.com" class="link-item" id="link-chatgpt">
            <div class="icon">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
              </svg>
            </div>
            <span>ChatGPT</span>
            <span class="shortcut">C</span>
          </a>
          <a href="https://claude.ai" class="link-item" id="link-claude">
            <div class="icon">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
                <path d="M2 17l10 5 10-5"></path>
                <path d="M2 12l10 5 10-5"></path>
              </svg>
            </div>
            <span>Claude</span>
            <span class="shortcut">A</span>
          </a>
          <a href="https://gemini.google.com" class="link-item" id="link-gemini">
            <div class="icon">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polygon
                  points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"
                ></polygon>
              </svg>
            </div>
            <span>Gemini</span>
          </a>
        </div>
      </section>

      <section class="group" id="group-dev">
        <div class="group-label">Development</div>
        <div class="links">
          <a href="https://github.com" class="link-item" id="link-github">
            <div class="icon">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path
                  d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"
                ></path>
              </svg>
            </div>
            <span>GitHub</span>
            <span class="shortcut">G</span>
          </a>
          <a href="https://stackoverflow.com" class="link-item" id="link-stackoverflow">
            <div class="icon">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-6"></path>
                <path d="M23 6L14 3"></path>
                <path d="M23 10l-9-2"></path>
                <path d="M23 14l-9-1"></path>
              </svg>
            </div>
            <span>Stack Overflow</span>
          </a>
        </div>
      </section>

      <section class="group" id="group-social">
        <div class="group-label">Social</div>
        <div class="links">
          <a href="https://twitter.com" class="link-item" id="link-twitter">
            <div class="icon">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path
                  d="M23 3a10.9 10.9 0 0 1-3.14 1.53 4.48 4.48 0 0 0-7.86 3v1A10.66 10.66 0 0 1 3 4s-4 9 5 13a11.64 11.64 0 0 1-7 2c9 5 20 0 20-11.5a4.5 4.5 0 0 0-.08-.83A7.72 7.72 0 0 0 23 3z"
                ></path>
              </svg>
            </div>
            <span>X / Twitter</span>
          </a>
          <a href="https://reddit.com" class="link-item" id="link-reddit">
            <div class="icon">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="14.31" y1="8" x2="20.05" y2="17.94"></line>
                <line x1="9.69" y1="8" x2="21.17" y2="8"></line>
                <line x1="7.38" y1="12" x2="13.12" y2="2.06"></line>
                <line x1="9.69" y1="16" x2="3.95" y2="6.06"></line>
                <line x1="14.31" y1="16" x2="2.83" y2="16"></line>
                <line x1="16.62" y1="12" x2="10.88" y2="21.94"></line>
              </svg>
            </div>
            <span>Reddit</span>
          </a>
        </div>
      </section>

      <footer class="shelf-footer">
        <div><span class="status-dot"></span>System Ready</div>
        <div>SHLF-01</div>
      </footer>
    </aside>

    <main style="flex: 1; display: flex; align-items: center; justify-content: center; opacity: 0.1">
      <!-- Content area (minimized as per request for utility shelf focus) -->
      <svg width="200" height="200" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="0.5">
        <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
        <path d="M2 17l10 5 10-5"></path>
        <path d="M2 12l10 5 10-5"></path>
      </svg>
    </main>
  </body>
</html>
