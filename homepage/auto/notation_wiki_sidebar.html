<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notation Wiki Sidebar - Homepage</title>
    <meta
      name="description"
      content="A compact, left-aligned bookmark dashboard inspired by Notion and personal wiki sidebars."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      :root {
        --sidebar-width: 280px;
        --bg-color: #ffffff;
        --sidebar-bg: #f7f6f3;
        --text-main: #37352f;
        --text-subtle: #787774;
        --accent-line: rgba(55, 53, 47, 0.08);
        --hover-bg: rgba(55, 53, 47, 0.04);
        --active-bg: rgba(55, 53, 47, 0.08);
        --icon-size: 16px;
        --font-main: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg-color: #191919;
          --sidebar-bg: #191919;
          --text-main: rgba(255, 255, 255, 0.9);
          --text-subtle: rgba(255, 255, 255, 0.5);
          --accent-line: rgba(255, 255, 255, 0.1);
          --hover-bg: rgba(255, 255, 255, 0.05);
          --active-bg: rgba(255, 255, 255, 0.1);
        }
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: var(--font-main);
        background-color: var(--bg-color);
        color: var(--text-main);
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }

      .sidebar {
        width: var(--sidebar-width);
        height: 100vh;
        background-color: var(--sidebar-bg);
        border-right: 1px solid var(--accent-line);
        padding: 24px 12px;
        position: fixed;
        left: 0;
        top: 0;
        overflow-y: auto;
      }

      .header {
        padding: 0 12px 20px 12px;
        font-size: 14px;
        font-weight: 600;
        letter-spacing: -0.01em;
        color: var(--text-subtle);
        text-transform: uppercase;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .section {
        margin-bottom: 24px;
      }

      .section-title {
        font-size: 12px;
        font-weight: 600;
        color: var(--text-subtle);
        padding: 4px 12px;
        margin-bottom: 4px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        cursor: default;
      }

      .section-content {
        border-left: 1px solid var(--accent-line);
        margin-left: 16px;
        padding-left: 4px;
      }

      .link-item {
        display: flex;
        align-items: center;
        padding: 6px 12px;
        text-decoration: none;
        color: var(--text-main);
        font-size: 14px;
        border-radius: 4px;
        transition: background 0.1s ease;
        margin: 1px 0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .link-item:hover {
        background-color: var(--hover-bg);
      }

      .link-item:active {
        background-color: var(--active-bg);
      }

      .icon {
        width: var(--icon-size);
        height: var(--icon-size);
        margin-right: 8px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        opacity: 0.8;
      }

      .external-icon {
        margin-left: auto;
        opacity: 0;
        font-size: 10px;
        transition: opacity 0.2s ease;
      }

      .link-item:hover .external-icon {
        opacity: 0.3;
      }

      /* Group Dividers */
      .divider {
        height: 1px;
        background-color: var(--accent-line);
        margin: 12px 0;
      }

      /* Scrollbar Styling */
      .sidebar::-webkit-scrollbar {
        width: 6px;
      }
      .sidebar::-webkit-scrollbar-thumb {
        background: rgba(0, 0, 0, 0.05);
        border-radius: 10px;
      }
      @media (prefers-color-scheme: dark) {
        .sidebar::-webkit-scrollbar-thumb {
          background: rgba(255, 255, 255, 0.05);
        }
      }
      .sidebar:hover::-webkit-scrollbar-thumb {
        background: rgba(0, 0, 0, 0.1);
      }
    </style>
  </head>
  <body>
    <aside class="sidebar">
      <div class="header">
        <span>Workspace</span>
      </div>

      <div class="section">
        <div class="section-title">SEARCH</div>
        <div class="section-content">
          <a href="https://www.google.com" class="link-item" id="link-google">
            <span class="icon">🔍</span>
            <span>Google</span>
            <span class="external-icon">↗</span>
          </a>
          <a href="https://www.bing.com" class="link-item" id="link-bing">
            <span class="icon">🌍</span>
            <span>Bing</span>
            <span class="external-icon">↗</span>
          </a>
          <a href="https://duckduckgo.com" class="link-item" id="link-ddg">
            <span class="icon">🦆</span>
            <span>DuckDuckGo</span>
            <span class="external-icon">↗</span>
          </a>
        </div>
      </div>

      <div class="section">
        <div class="section-title">ARTIFICIAL INTELLIGENCE</div>
        <div class="section-content">
          <a href="https://chatgpt.com" class="link-item" id="link-chatgpt">
            <span class="icon">🤖</span>
            <span>ChatGPT</span>
            <span class="external-icon">↗</span>
          </a>
          <a href="https://claude.ai" class="link-item" id="link-claude">
            <span class="icon">🧠</span>
            <span>Claude</span>
            <span class="external-icon">↗</span>
          </a>
          <a href="https://gemini.google.com" class="link-item" id="link-gemini">
            <span class="icon">✨</span>
            <span>Gemini</span>
            <span class="external-icon">↗</span>
          </a>
          <a href="https://perplexity.ai" class="link-item" id="link-perplexity">
            <span class="icon">🔮</span>
            <span>Perplexity</span>
            <span class="external-icon">↗</span>
          </a>
        </div>
      </div>

      <div class="section">
        <div class="section-title">DEVELOPMENT</div>
        <div class="section-content">
          <a href="https://github.com" class="link-item" id="link-github">
            <span class="icon">🐙</span>
            <span>GitHub</span>
            <span class="external-icon">↗</span>
          </a>
          <a href="https://stackoverflow.com" class="link-item" id="link-stackoverflow">
            <span class="icon">🥞</span>
            <span>Stack Overflow</span>
            <span class="external-icon">↗</span>
          </a>
          <a href="https://vercel.com" class="link-item" id="link-vercel">
            <span class="icon">▲</span>
            <span>Vercel</span>
            <span class="external-icon">↗</span>
          </a>
        </div>
      </div>

      <div class="section">
        <div class="section-title">SOCIAL</div>
        <div class="section-content">
          <a href="https://twitter.com" class="link-item" id="link-twitter">
            <span class="icon">🐦</span>
            <span>Twitter / X</span>
            <span class="external-icon">↗</span>
          </a>
          <a href="https://reddit.com" class="link-item" id="link-reddit">
            <span class="icon">👽</span>
            <span>Reddit</span>
            <span class="external-icon">↗</span>
          </a>
        </div>
      </div>

      <div class="divider"></div>

      <div class="section">
        <div class="section-title">RESOURCES</div>
        <div class="section-content">
          <a href="#" class="link-item">
            <span class="icon">📄</span>
            <span>Documentation</span>
          </a>
          <a href="#" class="link-item">
            <span class="icon">⚙️</span>
            <span>Settings</span>
          </a>
        </div>
      </div>
    </aside>

    <main style="margin-left: var(--sidebar-width); padding: 40px">
      <!-- Main content area left empty as requested, focus is on the sidebar layout -->
    </main>
  </body>
</html>
