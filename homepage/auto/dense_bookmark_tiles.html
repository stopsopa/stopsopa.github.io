<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dense Bookmark Tiles - Personal Speed Dial</title>
    <meta name="description" content="A compact, efficient, and aesthetic speed-dial layout for frequently used links.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --sidebar-bg: rgba(30, 41, 59, 0.7);
            --tile-bg: rgba(51, 65, 85, 0.4);
            --tile-hover: rgba(51, 65, 85, 0.8);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-color: #38bdf8;
            --border-color: rgba(255, 255, 255, 0.1);
            --glass-blur: 12px;
            --sidebar-width: 400px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.1) 0px, transparent 50%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: flex-start; /* Left aligned */
            padding: 40px;
        }

        .container {
            width: var(--sidebar-width);
            background: var(--sidebar-bg);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        header {
            margin-bottom: 32px;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.025em;
            margin-bottom: 4px;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .group {
            margin-bottom: 24px;
        }

        .group-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-secondary);
            margin-bottom: 12px;
            padding-left: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .group-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }

        .tiles-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .tile {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            background: var(--tile-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px 8px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            gap: 8px;
        }

        .tile:hover {
            background: var(--tile-hover);
            border-color: var(--accent-color);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .tile:active {
            transform: translateY(0);
        }

        .tile-icon {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-color);
        }

        .tile-name {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-primary);
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
        }

        /* SVG Icon styling */
        svg {
            width: 100%;
            height: 100%;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .container {
            animation: fadeIn 0.6s ease-out;
        }

        .group {
            animation: fadeIn 0.8s ease-out both;
        }

        .group:nth-child(2) { animation-delay: 0.1s; }
        .group:nth-child(3) { animation-delay: 0.2s; }
        .group:nth-child(4) { animation-delay: 0.3s; }

    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Speed Dial</h1>
            <p class="subtitle">Most frequently used links</p>
        </header>

        <!-- AI Group -->
        <div class="group">
            <h2 class="group-title">AI tools</h2>
            <div class="tiles-grid">
                <a href="https://chat.openai.com" class="tile" id="link-chatgpt">
                    <div class="tile-icon">
                        <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 18a8 8 0 1 1 8-8 8 8 0 0 1-8 8z"></path><path d="M12 6a6 6 0 1 0 6 6 6 6 0 0 0-6-6zm0 10a4 4 0 1 1 4-4 4 4 0 0 1-4 4z"></path></svg>
                    </div>
                    <span class="tile-name">ChatGPT</span>
                </a>
                <a href="https://claude.ai" class="tile" id="link-claude">
                    <div class="tile-icon">
                        <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
                    </div>
                    <span class="tile-name">Claude</span>
                </a>
                <a href="https://gemini.google.com" class="tile" id="link-gemini">
                    <div class="tile-icon">
                        <svg viewBox="0 0 24 24"><path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-12.728l.707.707m11.314 11.314l.707.707"></path></svg>
                    </div>
                    <span class="tile-name">Gemini</span>
                </a>
            </div>
        </div>

        <!-- Dev Group -->
        <div class="group">
            <h2 class="group-title">Development</h2>
            <div class="tiles-grid">
                <a href="https://github.com" class="tile" id="link-github">
                    <div class="tile-icon">
                        <svg viewBox="0 0 24 24"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>
                    </div>
                    <span class="tile-name">GitHub</span>
                </a>
                <a href="https://stackoverflow.com" class="tile" id="link-stackoverflow">
                    <div class="tile-icon">
                        <svg viewBox="0 0 24 24"><path d="M18.98 20.31V13.5h-2.16v4.65H7.18V13.5H5.02v6.81h13.96zM15.1 11.39l-4.77 1 .21 1.05 4.77-1-.21-1.05zm-4.34-2.1l4.48 1.87.43-.99-4.48-1.87-.43.99zm-1.86-2.53l3.64 3.23.71-.81-3.64-3.23-.71.81zm-1.02-2.73l2.36 4.31.95-.52-2.36-4.31-.95.52zm8.33 13.32H7.18v1.08h10.22v-1.08z"></path></svg>
                    </div>
                    <span class="tile-name">Stack</span>
                </a>
                <a href="https://npmjs.com" class="tile" id="link-npm">
                    <div class="tile-icon">
                        <svg viewBox="0 0 24 24"><path d="M3 4h18v16H3V4zm5 4v8h4V8H8zm6 0v8h2V8h-2zm-3 0v5h1V8h-1z"></path></svg>
                    </div>
                    <span class="tile-name">npm</span>
                </a>
            </div>
        </div>

        <!-- Search Group -->
        <div class="group">
            <h2 class="group-title">Search & Tools</h2>
            <div class="tiles-grid">
                <a href="https://google.com" class="tile" id="link-google">
                    <div class="tile-icon">
                        <svg viewBox="0 0 24 24"><path d="M19 13H5v-2h14v2z"></path><path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 18a8 8 0 1 1 8-8 8 8 0 0 1-8 8z"></path></svg>
                    </div>
                    <span class="tile-name">Google</span>
                </a>
                <a href="https://youtube.com" class="tile" id="link-youtube">
                    <div class="tile-icon">
                        <svg viewBox="0 0 24 24"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.46a2.78 2.78 0 0 0-1.94 2A29 29 0 0 0 1 11.75a29 29 0 0 0 .46 5.33A2.78 2.78 0 0 0 3.4 19c1.72.46 8.6.46 8.6.46s6.88 0 8.6-.46a2.78 2.78 0 0 0 1.94-2 29 29 0 0 0 .46-5.25 29 29 0 0 0-.46-5.33z"></path><polygon points="9.75 15.02 15.5 11.75 9.75 8.48 9.75 15.02"></polygon></svg>
                    </div>
                    <span class="tile-name">YouTube</span>
                </a>
                <a href="https://calendar.google.com" class="tile" id="link-calendar">
                    <div class="tile-icon">
                        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                    </div>
                    <span class="tile-name">Calendar</span>
                </a>
            </div>
        </div>

    </div>

</body>
</html>
