  <body class="layout bg" toc>
    <div class="body">
      <div class="inside">
        <div class="cards">
          <h2>BlackHole Record screen with internal sound</h2>
          <script type="editor" data-lang="python">

            Requirements:
              Download the latest installer
              Close all running audio applications
              Open and install package
                from: https://github.com/ExistentialAudio/BlackHole#option-1-download-installer

            Note:
              there is an option to install it from brew:
                https://github.com/ExistentialAudio/BlackHole#option-2-install-via-homebrew
                export HOMEBREW_NO_AUTO_UPDATE=1 && brew install blackhole-2ch

            Then do the following step by step:
              1) visit: https://existential.audio/
              2) click: BlackHole Route Audio Between Apps (First on the top)
              3) fill the form (I used my s..dot..i[at]gmail.com)
              4) find email -> click the link
              5) on download page download Install BlackHole 2ch v0.4.0
              6) Use Spotlight to find "audio midi setup" https://i.imgur.com/YCMTJ9r.png

              7) setup as follow: https://youtu.be/z6bQheX8CEk
                  WARNING: USE "Create Multi-Output Device" https://i.imgur.com/R4FrfAT.png
                  you will create three devices: https://i.imgur.com/TRM7K7U.png
                  - BlackHole & Headphones  : https://i.imgur.com/SFNK4QT.png
                  - BlackHole & Speakers    : https://i.imgur.com/wvICFGu.png
                  - BlackHole Only          : https://i.imgur.com/KUMofvV.png

              8) create also at least two "Aggregate Devices" https://i.imgur.com/O6SB82c.png
                  - Record mac & mic        : https://i.imgur.com/rqYzQbJ.png
                  - Record mac ONLY         : https://i.imgur.com/qQd51Zh.png
                    NOTICE: worth mentioning is that if you choose this "Record mac ONLY" device
                            it will actually work the same way as choosing BlackHole 2ch
                            https://i.imgur.com/z1RCqw6.png
                            But I've added it just for semantic, to have two self descriptive options to choose from

              9) Select Output device https://i.imgur.com/cLGuWIa.png
                  Selecting any of those three will allow you to record from internal sound
                  but depends what you choose you will also be able to hear sound from headphones
                  external speaker or you will not hear it at all, but it will be still recorded

              10) To use QuickTime to record just whats comming from computer
                  just choose BlackHole 2ch or "Record mac ONLY" https://i.imgur.com/z1RCqw6.png

                More resources:
                https://youtu.be/F67Jj5QCct8
                https://youtu.be/cLEaQi6H8N0
                see description of the movie

                more info:
                https://github.com/ExistentialAudio/BlackHole
                https://www.youtube.com/watch?v=HRwuyPZ4nBM
          </script>
