<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />

    <title>GCP Floating Label Pattern</title>
    <link rel="stylesheet" href="floating-label-pattern.css" />

    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <style>
      .g-inter {
        font-family: Inter, sans-serif;
        font-feature-settings: "liga" 1, "calt" 1, /* fix for Chrome */ "zero", "ss01";
      }

      :root {
        font-family: "Inter", sans-serif;
      }
      body {
        font-family: "Inter", sans-serif;
      }
      @supports (font-variation-settings: normal) {
        :root {
          font-family: "Inter var", sans-serif;
          font-feature-settings: "liga" 1, "calt" 1, /* fix for Chrome */ "zero", "ss01";
        }
      }
      form {
        width: 800px;
        border-right: 1px solid darkgray;
        padding-right: 12px;
      }
    </style>
  </head>
  <body class="layout bg">
    <div class="body">
      <div class="inside">
        <h2>GCP Style Floating Labels</h2>

        <form autocomplete="on">
          <!-- Field 1 -->
          <div class="floating-label" id="name-wrapper">
            <input type="text" id="name" name="name" placeholder="&nbsp;" autocomplete="name" />
            <label for="name">Project Name *</label>
            <div class="error">This field is required</div>
            <div class="helper-text">Enter a valid GCP admin email</div>
          </div>

          <!-- Field 2 -->
          <div class="floating-label" id="email-wrapper">
            <input type="email" id="email" placeholder="&nbsp;" autocomplete="email" />
            <label for="email">User Email</label>
            <div class="error">Enter a valid user email</div>
            <div class="helper-text">Enter a valid GCP admin email</div>
          </div>

          <!-- Field 3 -->
          <div class="floating-label" id="addremove-wrapper">
            <input type="email" id="addremove" placeholder="&nbsp;" autocomplete="email" />
            <label for="addremove">Admin Email</label>
            <div class="helper-text">Enter a valid GCP admin email</div>
          </div>

          <!-- Field 4 -->
          <div class="floating-label">
            <input type="password" id="dummy" placeholder="why is this here?" autocomplete="current-password" />
            <label for="dummy">Dummy last field</label>
          </div>

          <br />
          <input type="submit" value="Submit" />
        </form>
        <!-- </div> -->

        <hr />
        <input type="range" id="range" min="1" max="100" step="1" value="80" />
        <br />

        <div class="controls">
          <label class="error-toggle">
            <input type="checkbox" data-toggle-class="#name-wrapper" />
            Toggle Error State
          </label>
        </div>
        <div class="controls">
          <label class="error-toggle">
            <input type="checkbox" data-toggle-class="#email-wrapper" />
            Toggle Error State
          </label>
        </div>
        <div class="controls">
          <label class="error-toggle">
            <input type="checkbox" data-add-remove-element="#addremove-wrapper" />
            add/remove .error
          </label>
        </div>
        <br />
        <br />
        <script type="editor" data-lang="js" data-eval>

          urlwizzard.schema://urlwizzard.hostnegotiated/viewer.html?file=%2Fpages%2Fhtml%2Ffloat-label-pattern%2Ffloating-label-pattern.css

          <link rel="stylesheet" href="urlwizzard.schema://urlwizzard.hostnegotiated/pages/html/float-label-pattern/floating-label-pattern.css" />

          <div class="floating-label">
            <input type="text" id="name" name="name" placeholder="&nbsp;" autocomplete="name"/>
            <label for="name">Name *</label>
            <!--
                You can create it but it will be only visible when .floating-label element
                has attr [data-error]
                <div class="error">This field is required</div>
            -->
          </div>
        </script>
      </div>
    </div>

    <script>
      function log(...args) {
        console.log(...args);
      }
      document.body.addEventListener("change", function (e) {
        var el = e.target;

        if (el.matches("[data-toggle-class]")) {
          const selector = el.getAttribute("data-toggle-class");
          const target = document.querySelector(selector);
          if (!target) {
            return;
          }

          if (el.checked) {
            target.setAttribute("data-error", "true");
          } else {
            target.removeAttribute("data-error");
          }
        }

        if (el.matches("[data-add-remove-element]")) {
          const selector = el.getAttribute("data-add-remove-element");
          const target = document.querySelector(selector);
          if (!target) {
            return;
          }
          if (el.checked) {
            // <div class="error">Enter a valid GCP admin email</div>
            const div = document.createElement("div");
            div.className = "error";
            div.textContent = "Enter a valid GCP admin email";
            target.appendChild(div);
            target.setAttribute("data-error", "true");
          } else {
            target.querySelector(".error").remove();
            target.removeAttribute("data-error");
          }
        }
      });

      function range(element, event) {
        function hc() {
          event(parseInt(element.value, 10));
        }
        element.addEventListener("change", hc);
        element.addEventListener("input", hc);
        hc();
      }
      const form = document.querySelector("form");
      let realWidth = form ? form.getBoundingClientRect().width : 0;
      const rangeEl = document.querySelector("#range");
      range(rangeEl, (v) => {
        // this will trigger once only when attached to dom element
        const percent = v / 100;
        const width = parseInt(realWidth * percent, 10);
        log("h", {
          realWidth,
          percent,
          width,
        });
        form.style.width = width + "px";
      });
    </script>
    <script type="module" src="/js/github.js"></script>
  </body>
</html>
