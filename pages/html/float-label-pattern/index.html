<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />

    <title>GCP Floating Label Pattern</title>
    <link rel="stylesheet" href="floating-label-pattern.css" />

    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <style>
      .g-inter {
        font-family: Inter, sans-serif;
        font-feature-settings: "liga" 1, "calt" 1, /* fix for Chrome */ "zero", "ss01";
      }

      :root {
        font-family: "Inter", sans-serif;
      }
      body {
        font-family: "Inter", sans-serif;
      }
      @supports (font-variation-settings: normal) {
        :root {
          font-family: "Inter var", sans-serif;
          font-feature-settings: "liga" 1, "calt" 1, /* fix for Chrome */ "zero", "ss01";
        }
      }
    </style>
  </head>
  <body class="layout bg">
    <div class="body">
      <div class="inside">
        <h2>GCP Style Floating Labels</h2>

        <!-- Field 1 -->
        <!-- <div class="field"> -->
        <div class="floating-label" id="name-wrapper">
          <input type="text" id="name" placeholder="&nbsp;" autocomplete="off" />
          <label for="name">Project Name 0</label>
        </div>
        <div class="floating-label-error-msg">This field is required</div>
        <!-- </div> -->

        <!-- Field 2 -->
        <!-- <div class="field"> -->
        <div class="floating-label" id="email-wrapper">
          <input type="email" id="email" placeholder="&nbsp;" autocomplete="off" />
          <label for="email">Admin Email</label>
        </div>
        <div class="floating-label-error-msg">Enter a valid GCP admin email</div>
        <!-- </div> -->

        <!-- Field 3 -->
        <!-- <div class="field"> -->
        <div class="floating-label" id="addremove-wrapper">
          <input type="email" id="email" placeholder="&nbsp;" autocomplete="off" />
          <label for="email">Admin Email</label>
        </div>
        <!-- </div> -->
        <!-- Field 3 -->
        <!-- <div class="field"> -->
        <div class="floating-label">
          <input type="email" id="email" placeholder="why is this here?" autocomplete="off" />
          <label for="email">Dummy last field</label>
        </div>
        <!-- </div> -->

        <hr />

        <div class="controls">
          <label class="error-toggle">
            <input type="checkbox" data-toggle-class="#name-wrapper" />
            Toggle Error State
          </label>
        </div>
        <div class="controls">
          <label class="error-toggle">
            <input type="checkbox" data-toggle-class="#email-wrapper" />
            Toggle Error State
          </label>
        </div>
        <div class="controls">
          <label class="error-toggle">
            <input type="checkbox" data-add-remove-element="#addremove-wrapper" />
            add/remove .floating-label-error-msg
          </label>
        </div>
      </div>
    </div>

    <script>
      document.body.addEventListener("change", function (e) {
        var el = e.target;

        if (el.matches("[data-toggle-class]")) {
          const selector = el.getAttribute("data-toggle-class");
          const target = document.querySelector(selector);
          if (el.checked) {
            target.setAttribute("data-error", "true");
          } else {
            target.removeAttribute("data-error");
          }
        }

        if (el.matches("[data-add-remove-element]")) {
          const selector = el.getAttribute("data-add-remove-element");
          const target = document.querySelector(selector);
          if (el.checked) {
            // <div class="floating-label-error-msg">Enter a valid GCP admin email</div>
            const div = document.createElement("div");
            div.className = "floating-label-error-msg";
            div.textContent = "Enter a valid GCP admin email";
            after(target, div);
            target.setAttribute("data-error", "true");
          } else {
            target.nextElementSibling.remove();
            target.removeAttribute("data-error");
          }
        }
      });

      function before(referenceNode, newNode) {
        referenceNode.parentNode.insertBefore(newNode, referenceNode);
      }
      function append(parentNode, newNode) {
        parentNode.appendChild(newNode);
      }
      function after(referenceNode, newNode) {
        if (referenceNode.nextSibling) {
          before(referenceNode.nextSibling, newNode);
        } else {
          append(referenceNode.parentNode, newNode);
        }
      }
    </script>
    <script type="module" src="/js/github.js"></script>
  </body>
</html>
