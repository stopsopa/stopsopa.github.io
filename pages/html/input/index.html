<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />

    <title>stopsopa.github.io</title>
    <style>
      .pre {
        margin-top: 10px;
        display: grid;
        grid-auto-flow: column;
        grid-auto-columns: 1fr;
        gap: 12px;
        align-items: stretch;

        section {
          display: grid;
          grid-template-rows: auto 1fr;
          min-width: 0;
          border: 1px solid #ccc;
          border-radius: 8px;
          overflow: hidden;
        }

        header {
          padding: 10px 12px;
          font-weight: 600;
          border-bottom: 1px solid #ccc;
          background: #f5f5f5;
        }

        pre {
          margin: 0;
          padding: 12px;
          overflow: auto;
          min-width: 0;
        }
      }
      #checkboxes {
        padding: 15px;
        label {
          display: inline;
          margin-right: 20px;
        }
      }
    </style>
  </head>
  <body class="layout bg">
    <div class="body">
      <!-- <div class="inside" style="max-width: none; padding-left: 80px; padding-right: 30px;"> -->
      <div class="inside">
        <div class="cards">
          <h2>Index</h2>
          <script type="editor" data-lang="sh">

            urlwizzard.schema://urlwizzard.hostnegotiated/viewer.html?file=%2Fpages%2Fhtml%2Finput%2Finput.ts
            urlwizzard.schema://urlwizzard.hostnegotiated/viewer.html?file=%2Fpages%2Fhtml%2Finput%2Finput.js
                wget urlwizzard.schema://urlwizzard.hostnegotiated/pages/html/input/input.ts
                wget urlwizzard.schema://urlwizzard.hostnegotiated/pages/html/input/input.js
          </script>
          <!-- "input" | "change" | "keydown" | "keyup"; -->
          <div id="checkboxes">
            <label> <input type="checkbox" id="input" checked /> : input </label>
            <label> <input type="checkbox" id="change" checked /> : change </label>
            <label> <input type="checkbox" id="keydown" /> : keydown </label>
            <label> <input type="checkbox" id="keyup" /> : keyup </label>
          </div>
        </div>

        <form>
          <h2>form</h2>
          <label>input: <input type="text" /></label>
          <input type="submit" value="submit" />
        </form>
        <button id="reset" type="button">reset</button>
      </div>
    </div>

    <div class="pre">
      <section id="target">
        <header>e.target.constructor.name</header>
        <pre></pre>
      </section>

      <section id="type">
        <header>e.type</header>
        <pre></pre>
      </section>

      <section id="data">
        <header>e.data</header>
        <pre></pre>
      </section>

      <section id="key">
        <header>e.key</header>
        <pre></pre>
      </section>

      <section id="value">
        <header>e.target.value</header>
        <pre></pre>
      </section>
    </div>
    <script type="module" src="/js/github.js"></script>
    <script type="module" src="index.js"></script>
  </body>
</html>
