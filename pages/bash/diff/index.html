          <h2>See diff two files or two curls</h2>
          <script type="editor" data-lang="sh">

            diff -qr --exclude=".git" --exclude="node_modules" [dir] [dir]
               // that will print which files are different without details
               // use this one to generally list different files

             diff -r --exclude=".git" --exclude="node_modules" [dir] [dir]
               // and then remove -q to see the diffs

             // diff for directory and it's content ---------------- ^^^

             diff <(curl https://foo.com) <(curl https://bar.com)

             # or
             vim -d /tmp/1 /tmp/2
                 # from: https://youtu.be/cnmtKv2kUXs?t=268
          </script>
          <h2>test: generating diff files</h2>
          <script type="editor" data-lang="sh">

            mkdir ttt
            cd ttt
            cat <<EEE > a.js
            abc
            def
            ghi
            jkl
            mno
            pqr
            stu
            wxy
            z
            EEE


            cat <<EEE > b.js
            vgr
            abc
            ghi
            jkl
            new
            pqr
            stt
            wxy
            z
            EEE

            diff -u a.js b.js > diff.diff

            # will generate
            --- a.js	2024-06-19 00:33:14
            +++ b.js	2024-06-19 00:33:43
            @@ -1,9 +1,9 @@
            +vgr
            abc
            -def
            ghi
            jkl
            -mno
            +new
            pqr
            -stu
            +stt
            wxy
            z
            \ No newline at end of file
            # will generate

            # now once we have that
            cp a.js restored.js
            patch restored.js diff.diff
            # now restored.js will be the same as b.js
            # we can confirm that running
            diff -u b.js restored.js
            # will print nothing and return 0 exit code
          </script>
          <h2>diff + patch using bsdiff + bspatch</h2>
          <script type="editor" data-lang="sh">

            mkdir tttt
            cd tttt
            cat <<EEE > main.go
            package main
            import "fmt"
            func main() {fmt.Println("Hello, World!")}
            EEE
            cat <<EEE > go.mod
            module example/hello
            go 1.22.0
            EEE
            go build
            ./hello
            # program works

            cp hello broken
            chmod a+x broken
            ./broken
            # working copy of program

            /bin/bash bash/fs/break-file.sh 3 broken

            ./broken
            # now it doesn't work

            # let's generate diff:
            bsdiff broken hello diff.diff
            ls -la
            # let's see how small diff file is

            # let's generate fixed file using broken file and diff
            bspatch broken fixed diff.diff
            chmod a+x fixed

            # and now it works back again
            ./fixed
          </script>
          <h2>diff + patch using xdelta3</h2>
          <script type="editor" data-lang="sh">

            # it have to binstalled on mac via brew or on linux in some way but it is good
            # one binary to generate diffs and patch files

            mkdir gocode
            cat <<EEE > gocode/main.go
            package main
            import "fmt"
            func main() {	fmt.Println("Hello from the compiled Go binary! changed")  }
            EEE

            cat <<EEE
            # /bin/bash compile.sh <target_name>
            # /bin/bash compile.sh compile
            # /bin/bash compile.sh compile2

            set -e

            TARGET="\${1}"

            # Change directory to where the script is located
            DIR="\$( cd "\$( dirname "\${BASH_SOURCE[0]}" )" && pwd )"
            cd "\${DIR}"

            # Navigate into the gocode directory
            cd gocode

            # Initialize Go module if it doesn't exist
            if [ ! -f "go.mod" ]; then
                go mod init gocode
            fi

            # Build the Go file into a binary named 'compile' in the 'diff' directory
            go build -o "../\${TARGET}" main.go

            echo "Compilation successful. Binary is located at \${DIR}/compile"

            EEE


            # from that point we can work with xdelta3

            xdelta3 -e -s old.sqlite new.sqlite diff1.xdelta

            sqldiff old.db new.db > changes.sql


            files:
              a.jpeg
              b.jpeg

            Install:
                brew install xdelta

            Create delta:
                xdelta3 -e -s a.jpeg b.jpeg patch.xdelta

            Reconstruct:
                xdelta3 -d -s a.jpeg patch.xdelta reconstructed.jpeg



            # now let's generate diff for compile and compile2

            xdelta3 -e -s compile compile2 compile.xdelta
            xdelta3 -d -s compile compile.xdelta reconstructed
            chmod a+x reconstructed

            # then test
            ./compile
            ./compile2
            ./reconstructed
          </script>
