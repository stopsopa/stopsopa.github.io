          https://sqliteviewer.app/

            You can only explore fixed file - can't see live changes
            NOTE: this one have designer to visually represent relations between tables
            To change to journal_mode = WAL go to:
              - right click on the database in "Database Navigator"
              - select "Edit Connection"
              - in "Connection settings / TEMPORARY" select "Driver properties" tab
              - scroll down to "journal_mode" and change there to "WAL"
