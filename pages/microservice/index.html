        <h2>PROS & CONS</h2>
        
        <script type="editor" data-lang="sh">

          PROS:
            - separation of responsibility
            - you can deploy faster   
            - easier to onboard pretty much unlimited number of developers and don't block them

          CONS:
            - hard to keep apis to match - hard to communicate changes across the team, where in monolyth it would just not compile 
            - converting internal passing data via values or even references to network traffic
            - it's much harder to do anything in atomic fashion, logic might stuck in broken states
              - derrived problem: hard to implement and test solution fixing broken states     
            - generally harder to debug and harder to trace events
            - IMO: bigger danger of slowing development with time. more time spent of debugging weird errors and broken states
            - harder to find who is responsible for error (teams might point out at each other) - general confusion
            - much harder to keep the same style of coding (probably all services will be written in different way/techniques)
            - harder to launch local instance of set of services
            - harder to do real e2e testing and cleanup after
            
          General conclusion:
             Microservices are not bad for certain problems but it is always to keep low number of microservices.
             Only what is necessary
          
        </script>
