<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />

    <title>stopsopa.github.io</title>
  </head>
  <body class="layout bg" toc>
    <div class="body">
      <!-- <div class="inside" style="max-width: none; padding-left: 80px; padding-right: 30px;"> -->
      <div class="inside">
        <div class="cards">
          <h2>Index</h2>
          <script type="editor" data-lang="sh">

            // see article: https://patloeber.com/gemma-4-pi-agent/
                // g(How to run a local coding agent with Gemma 4 and Pi site:https://patloeber.com/)

            # configure lmstudio
                on mac mini run lmstudio and run model but also at the top press "Run server" button
                and then "Server Settings" and check "Server on Local Networ"

                then on macbook you should be able to run

                curl http://192.168.8.49:1234/v1/models

            # install pi
                https://pi.dev/
                # configure pi https://patloeber.com/gemma-4-pi-agent/#6-configure-the-local-model-in-pi

            # either edit in vscode ~/.pi/agent/models.json
            # or create fresh
            cat <<EEE > ~/.pi/agent/models.json
            {
                "providers": {
                    "lmstudio": {
                        "baseUrl": "http://192.168.8.49:1234/v1",
                        "api": "openai-completions",
                        "apiKey": "lm-studio",
                        "models": [
                            {
                                "id": "google/gemma-4-12b-qat",
                                "input": [
                                    "text",
                                    "image"
                                ]
                            }
                        ]
                    }
                }
            }
            EEE

            # see later also Open WebUI https://youtu.be/fTf-LZaGnpM
            
            
          </script>
        </div>
      </div>
    </div>
    <script type="module" src="/js/github.js"></script>
  </body>
</html>
