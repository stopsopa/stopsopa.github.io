        <div class="example1">
          <style>
            .example1 {
              [data-tooltipselector] {
                &.show {
                  background-color: rosybrown;
                }
              }

              .tooltipstyle {
                &.tooltip-toggle-click,
                &.tooltip-on-hover {
                  display: none;
                  &.show {
                    display: block;
                  }
                }
                background-color: #333;
                color: white;
                padding: 5px 10px;
                border-radius: 4px;
                font-size: 13px;
                .arrow,
                .arrow::before {
                  position: absolute;
                  width: 8px;
                  height: 8px;
                  background: inherit;
                }
  
                .arrow {
                  visibility: hidden;
                }
  
                .arrow::before {
                  visibility: visible;
                  content: "";
                  transform: rotate(45deg);
                }
                &[data-popper-placement^="top"] > .arrow {
                  bottom: -4px;
                }
  
                &[data-popper-placement^="bottom"] > .arrow {
                  top: -4px;
                }
  
                &[data-popper-placement^="left"] > .arrow {
                  right: -4px;
                }
  
                &[data-popper-placement^="right"] > .arrow {
                  left: -4px;
                }
              }
            }
          </style>

          <script type="editor" data-lang="js" data-eval>

            if (!window.allLoaded) {
              window.allLoaded = [];
            }
            window.allLoaded.push(function () {

              const setupTooltipGroup = (function () {
                const instances = {};

                let i = 0;
                function getNewId() {
                  return `tooltip-${i++}`;
                }

                let delegateBound = false;
                if (!delegateBound) {
                  delegateBound = true;

                  function eventBuilder(event, selector, act) {
                    return function (e) {

                      var el = e.target;

                      var match = el.matches(selector);

                      let id;

                      if (match) {

                        try {

                          id = el.getAttribute('data-tooltip-id');

                          if (typeof id !== 'string' || !id.trim()) {
                            return;
                          }

                          const basket = instances[id];

                          if (!basket) {
                            return;
                          }

                          const { target, tooltip, instance } = basket;

                          act(target, tooltip, instance);
                        }
                        catch (e) {

                          console.error(`tooltip ${event} error [id: ${id}]`, e)
                        }
                      }
                    }
                  }

                  // on hover
                  document.body.addEventListener('mouseover', eventBuilder('mouseover', '.tooltip-on-hover', (target, tooltip, instance) => {
                    tooltip.classList.add('show');
                    target.classList.add('show');
                    instance.update();
                  }));
                  document.body.addEventListener('focus', eventBuilder('focus', '.tooltip-on-hover', (target, tooltip, instance) => {
                    tooltip.classList.add('show');
                    target.classList.add('show');
                    instance.update();
                  }));
                  document.body.addEventListener('mouseout', eventBuilder('mouseout', '.tooltip-on-hover', (target, tooltip, instance) => {
                    tooltip.classList.remove('show');
                    target.classList.remove('show');
                  }));
                  document.body.addEventListener('blur', eventBuilder('blur', '.tooltip-on-hover', (target, tooltip, instance) => {
                    tooltip.classList.remove('show');
                    target.classList.remove('show');
                  }));

                  // on click
                  document.body.addEventListener('click', eventBuilder('click', '[data-tooltipselector].tooltip-toggle-click', (target, tooltip, instance) => {
                    if (tooltip.classList.contains('show')) {
                      tooltip.classList.remove('show');
                      target.classList.remove('show');
                    }
                    else {
                      tooltip.classList.add('show');
                      target.classList.add('show');
                      instance.update();
                    }
                  }));
                }

                return function (options = {}, dataSelector = 'data-tooltipselector') {
                  const ids = new Set();
                  return {
                    bindNew: function () {
                      Array.from(document.querySelectorAll(`[${dataSelector}]`)).forEach(target => {
                        if (target.hasAttribute('data-tooltip-id')) {
                          return; // ignore already binded
                        }

                        const selector = target.getAttribute(dataSelector);

                        if (typeof selector !== 'string') {
                          return;
                        }

                        const tooltip = document.querySelector(selector);

                        if (!tooltip) {
                          return; // can't find tooltip element
                        }

                        if (target.classList.contains('tooltip-on-hover')) {
                          tooltip.classList.add('tooltip-on-hover');
                        }

                        if (target.classList.contains('tooltip-toggle-click')) {
                          tooltip.classList.add('tooltip-toggle-click');
                          if (tooltip.classList.contains('show')) {
                            target.classList.add('show');
                          }
                        }

                        const id = getNewId();

                        ids.add(id);

                        const instance = Popper.createPopper(target, tooltip, options);

                        instances[id] = {
                          instance,
                          target,
                          tooltip,
                        }

                        target.setAttribute('data-tooltip-id', id);
                        tooltip.setAttribute('data-tooltip-id', id);
                      });
                    },
                    getInstance: id => instances[id],
                    getNewId,
                  };
                }
              }());

              const tooltipGroup = setupTooltipGroup({
                // placement: "right",
                modifiers: [
                  {
                    name: 'offset',
                    options: {
                      offset: [0, 8],
                    },
                  },
                ],
              })
              tooltipGroup.bindNew();
            });
          </script>
