<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>stopsopa.github.io</title>

    <script>
      (function () {
        var resolve;
        var p = new Promise(function (res) {
          resolve = res;
        });

        document.addEventListener("DOMContentLoaded", () => {
          // to eval what we hve in tinymce
          Array.prototype.slice.call(document.querySelectorAll("[data-eval]")).forEach(function (tag) {
            var text = tag.innerHTML;

            console.log("text", text, "tag", tag);

            {
              eval(text);
            }
          });

          resolve();
        });

        window.beforeAceEventPromise = function () {
          return p;
        };
      })();
    </script>
  </head>
  <body class="layout bg" toc>
    <div class="body">
      <div class="inside">
        <h2>vanila</h2>
        <p>On when page is visible</p>
        <p>To test first launch <a href="/pages/js/sound.html">/pages/js/sound.html</a></p>
        <script type="editor" data-lang="js" data-eval>
          {

            const handleVisibilityChange = () => {
              if (document.visibilityState === "visible") {
                console.log("visible");
                localStorage.setItem('sound-experiment', 830.61)
              } else {
                console.log("not visible");
                localStorage.setItem('sound-experiment', 415.3)
              }
            };
            document.addEventListener("visibilitychange", handleVisibilityChange);
            handleVisibilityChange();
          }
        </script>
      </div>
    </div>
    <script src="/js/github.js"></script>
  </body>
</html>
