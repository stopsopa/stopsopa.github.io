<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>stopsopa.github.io</title>

    <script>
      (function () {
        var resolve;
        var p = new Promise(function (res) {
          resolve = res;
        });

        document.addEventListener("DOMContentLoaded", () => {
          Array.prototype.slice.call(document.querySelectorAll("[data-eval]")).forEach(function (tag) {
            var text = tag.innerHTML;

            console.log("text", text, "tag", tag);

            {
              eval(text);
            }
          });

          resolve();
        });

        window.beforeAceEventPromise = function () {
          return p;
        };
      })();
    </script>
  </head>
  <body class="layout" toc>
    <div class="body">
      <div class="inside">
        <h2>custom1</h2>
        <div class="custom1">
            <script src="./001/custom1.js"></script>
            <custom-1></custom-1>
            <button class="add">add attr</button>
            <script type="editor" data-lang="js" data-eval>
                console.log('custom1 script');
                const parent = document.querySelector('.custom1');

                const wc = document.createElement('custom-1');

                const add = document.querySelector(".add");
                add.addEventListener('click', () => {
                    console.log('set color');
                    wc.setAttribute('color', 'green');
                });                    
    
            </script>
        </div>
      </div>
    </div>
    <script src="/js/github.js"></script>
  </body>
</html>
