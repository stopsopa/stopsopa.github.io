<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glow Sweep Color Test</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: var(--bg-color);
            font-family: 'Outfit', sans-serif;
            color: var(--text-color);
            gap: 2rem;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2rem;
            padding: 2rem;
        }

        /* Base Button Style */
        .btn {
            position: relative;
            padding: 15px 40px;
            text-decoration: none;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: none;
            cursor: pointer;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            border-radius: 4px;
            transition: transform 0.2s;
        }

        .btn:active {
            transform: scale(0.98);
        }

        /* Color Variations */
        .btn-dark { background-color: #1e293b; color: #fff; }
        .btn-bright { background-color: #f8fafc; color: #0f172a; }
        .btn-green { background-color: #22c55e; color: #fff; }
        .btn-blue { background-color: #3b82f6; color: #fff; }

        /* THE GLOW EFFECT - Activated by .glow class */
        .glow {
            overflow: hidden; /* Essential for the sweep to be contained */
        }

        .glow::after {
            content: '';
            position: absolute;
            top: 0;
            left: -150%;
            width: 100%;
            height: 100%;
            /* Tilted shine gradient */
            background: linear-gradient(115deg, 
                transparent, 
                rgba(255, 255, 255, 0.5), 
                transparent
            );
            /* mix-blend-mode: difference automatically makes the shine visible
               by calculating the difference between the background and white.
               On black backgrounds, it shows as white.
               On white backgrounds, it shows as black. */
            mix-blend-mode: difference;
            /* Animates from left to right on hover, and back on hover-off */
            transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glow:hover::after {
            left: 150%;
        }



        h2 {
            font-weight: 300;
            letter-spacing: 5px;
            text-transform: uppercase;
            opacity: 0.6;
            margin-bottom: 1rem;
        }

    </style>
</head>
<body>

    <h2>Button Color Test</h2>

    <div class="container">
        <!-- Dark Button -->
        <a href="#" class="btn btn-dark glow">Dark Glow</a>

        <!-- Blue Button -->
        <a href="#" class="btn btn-blue glow">Blue Glow</a>

        <!-- Green Button -->
        <a href="#" class="btn btn-green glow">Green Glow</a>

        <!-- Bright Button -->
        <a href="#" class="btn btn-bright glow">Bright Glow</a>
    </div>

</body>
</html>
