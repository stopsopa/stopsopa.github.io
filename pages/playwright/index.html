        <h2>playwright setup</h2>
        <a href="https://github.com/stopsopa/playwright-research">https://github.com/stopsopa/playwright-research</a>
        <script type="editor" data-lang="sh">

          wget --help 1> /dev/null 2> /dev/null
          if [ "${?}" = "0" ]; then
            function download {
              if [ "${2}" = "" ]; then; 2="${1}"; fi
              mkdir -p "$(dirname "${2}")"
              wget --no-cache -O "${2}" "https://raw.githubusercontent.com/stopsopa/playwright-research/master/${1}"
            }
          else # curl
            function download {
              if [ "${2}" = "" ]; then; 2="${1}"; fi
              mkdir -p "$(dirname "${2}")"
              curl "https://raw.githubusercontent.com/stopsopa/playwright-research/master/${1}" -o "${2}"
            }
          fi
          # download ".github/workflows/playwright.yml" "optionally/different/target/path/playwright.yml"
          download "playwright.sh"
          download "playwright.config.js"
          download "playwright-async.config.js"
          download "tests/tools/cmd.js"

          test -f package.json || echo "{}" > package.json
          yarn add -D playwright @playwright/test dotenv

          --- Then use
          ./node_modules/.bin/playwright codegen http://0.0.0.0:5678/vite-project/dist/
          /bin/bash playwright.sh composition/react/composite-select-demo-attr.e2e.ts
          /bin/bash playwright.sh -- --debug -- composition/react/composite-select-demo-attr.e2e.ts
          /bin/bash playwright.sh -- vite-project/src/App.e2e.ts -g "build list"
          /bin/bash playwright.sh -- --debug -g "select two" -- composition/composite-select/composite-select.e2e.ts
          /bin/bash playwright.sh           -- composition/react/composite-select-demo-attr.e2e.ts -g "show footer"
          /bin/bash playwright.sh -t docker -- composition/react/composite-select-demo-attr.e2e.ts -g "show footer"
          PLAYWRIGHT_BIN=podman /bin/bash pw.sh -t docker

          npx playwright show-report
          ./node_modules/.bin/playwright test --headed --forbid-only --project=chromium --workers=1
        </script>
        <h2>Usefull snippets</h2>
        <script type="editor" data-lang="ts">

          test.use({ actionTimeout: 2000 });
          await page.waitForTimeout(50);
          await expect.poll(async () => {
            const selectedItems = await querySelector(page, selector);
            return await selectedItems.innerHTML();
          }).toEqual(data);
          await expect.poll(async () => {
            return await page.locator('.status-message').textContent();
          }, {
            // Custom message if it times out
            message: 'The status message did not update in time',
            // Total time to keep trying (in milliseconds)
            timeout: 10000,
            // How long to wait between attempts
            intervals: [500, 1000, 2000],
          }).toEqual('Success');
          await expect(async () => {
            const selectedItems = await querySelector(page, selector);
            const content = await selectedItems.innerHTML();

            // A standard assertion inside the block
            expect(content).toEqual(data);
          }).toPass({
            timeout: 10000,
            intervals: [500]
          });

          // extra step for codegen
            await expect(page.locator("body")).toHaveCount(1);
            ./node_modules/.bin/playwright codegen http://0.0.0.0:5678/vite-project/dist/

          // extract different things
            const button = await page.getByRole("button", { name: "OK" });
            const backgroundColor = await button.evaluate((el) => {
              return window.getComputedStyle(el).getPropertyValue("background-color");
            });
            const outerHTML = await firstElement.evaluate((el) => el.outerHTML);
            const innerHTML = await firstElement.evaluate((el) => el.innerHTML);

          // selectors
            // in web component
            const section = await page.locator("center-and-height-resizer").locator(".buttons-container");

          // exist or not exist
            {
              await expect(section.locator(".clear-btn")).toBeVisible();
              await expect(section.locator(".loader")).not.toBeVisible();
            }

          // checkbox
            await page.locator("#loading-sel-1").check();
              // in docker this might throw Error: locator.check: Clicking the checkbox did not change its state
              // use .click() better in that case
            await page.locator("#loading-sel-1").uncheck();

            const style = await page.evaluate(async () => {
              const timeout = 5000;
              const start = Date.now();
          
              while (Date.now() - start < timeout) {
                const el = document.querySelector("monaco-diff") as any;
          
                if (el?.shadowRoot) {
                  await el.whenReady();
          
                  const target = el.shadowRoot.querySelector(".original-in-monaco-diff-editor");
          
                  if (target) {
                    return window.getComputedStyle(target).backgroundColor;
                  }
                }
          
                await new Promise((r) => setTimeout(r, 200));
              }
          
              throw new Error("Timeout waiting for monaco-diff style");
            });
          
        </script>
